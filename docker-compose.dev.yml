services:
  vue:
    tty: true
    container_name: dev_vue
    restart: on-failure
    working_dir: /workspaces/app
    env_file: .env.dev
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: devcontainer
    ports:
      - "5173:5173"
    networks:
      - devnet
    volumes:
      - ./:/workspaces/app:rw
      - ../.docker/node/node_modules:/workspaces/app/node_modules:rw

networks:
  devnet:
    name: devnet
    driver: bridge
